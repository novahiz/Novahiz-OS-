name: Novahiz OS CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  # =============================================================================
  # TESTS
  # =============================================================================
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd tests
          python -m pytest test_novahiz.py -v --cov=. --cov-report=xml

  # =============================================================================
  # SAST - Static Application Security Testing
  # =============================================================================
  sast:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          auditOn: push
        continue-on-error: true

  # =============================================================================
  # SCA - Software Composition Analysis (npm)
  # =============================================================================
  audit-npm:
    name: Audit NPM Dependencies
    runs-on: ubuntu-latest
    if: hashFiles('package-lock.json') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate SBOM
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-file sbom-npm.json || true

  # =============================================================================
  # SCA - Software Composition Analysis (pip)
  # =============================================================================
  audit-pip:
    name: Audit Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety and pip-audit
        run: |
          pip install safety pip-audit

      - name: Run pip-audit
        run: pip-audit --format=json --output=pip-audit-report.json || true
        continue-on-error: true

      - name: Run safety check
        run: safety check --json --output=safety-report.json || true
        continue-on-error: true

  # =============================================================================
  # SECRET SCANNING
  # =============================================================================
  secrets:
    name: Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # =============================================================================
  # LICENSE CHECK
  # =============================================================================
  licenses:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install license checkers
        run: |
          pip install pip-licenses
          npm install -g license-checker

      - name: Check Python licenses
        run: |
          pip-licenses --format=json --output-file=python-licenses.json || true
          pip-licenses | grep -iE 'gpl|agpl|lgpl' && echo "⚠️ GPL-family licenses detected" || echo "✅ No GPL licenses"
        continue-on-error: true

      - name: Check NPM licenses
        run: |
          license-checker --json --out npm-licenses.json || true
          license-checker | grep -iE 'GPL|AGPL|LGPL' && echo "⚠️ GPL-family licenses detected" || echo "✅ No GPL licenses"
        continue-on-error: true
        if: hashFiles('package-lock.json') != ''

  # =============================================================================
  # CODE QUALITY
  # =============================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install flake8 black pylint

      - name: Run black (format check)
        run: black --check runtime/ mcp/ engine/ scripts/ api/ plugins/ tests/

      - name: Run flake8
        run: flake8 runtime/ mcp/ engine/ scripts/ api/ plugins/ tests/ --max-line-length=120 --ignore=E501,W503,E402

      - name: Check for bare except clauses
        run: |
          found=$(grep -rn '^\s*except\s*:' --include='*.py' scripts/ engine/ api/ mcp/ runtime/ plugins/ tests/ || true)
          if [ -n "$found" ]; then
            echo "❌ Bare except clauses found:"
            echo "$found"
            exit 1
          fi
          echo "✅ No bare except clauses"

      - name: Check for stale Claude/Anthropic references
        run: |
          found=$(grep -rn 'claude\|anthropic' --include='*.py' --include='*.json' --include='*.yaml' --include='*.yml' --include='*.sh' scripts/ engine/ api/ mcp/ runtime/ plugins/ config/ || true)
          if [ -n "$found" ]; then
            echo "⚠️ Claude/Anthropic references found (non-blocking):"
            echo "$found"
          else
            echo "✅ No Claude references"
          fi

  # =============================================================================
  # SUMMARY
  # =============================================================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [tests, sast, audit-npm, audit-pip, secrets, licenses, quality]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Novahiz OS CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NPM Audit | ${{ needs.audit-npm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pip Audit | ${{ needs.audit-pip.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets | ${{ needs.secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Licenses | ${{ needs.licenses.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
