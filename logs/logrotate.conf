/home/novahiz/.opencode/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 novahiz novahiz
    dateext
    dateformat -%Y%m%d
    postrotate
        # Signal daemons to reopen log files if needed
        kill -HUP $(cat /home/novahiz/.opencode/pids/runtime.pid 2>/dev/null) 2>/dev/null || true
    endscript
}
