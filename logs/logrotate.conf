__NOVAHIZ_DIR__/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 novahiz novahiz
    dateext
    dateformat -%Y%m%d
    postrotate
        kill -HUP $(cat __NOVAHIZ_DIR__/pids/runtime.pid 2>/dev/null) 2>/dev/null || true
    endscript
}
